version: "3.8"

services:
  app:
    build:
      context: ./app
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"

  api-tests:
    build:
      context: ./tests/api
    depends_on:
      - app
    environment:
      BASE_URL: "http://app:8080"

  e2e-tests:
    build:
      context: ./tests/e2e
    depends_on:
      - app
    environment:
      BASE_URL: "http://app:8080"
